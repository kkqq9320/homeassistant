blueprint:
  name: Aqara Rotary Knob H1 – Adjustable Brightness & Color Temperature (Z2M)
  description: |-
    ## Supporting
      - Aqara Rotary Knob H1 (wireless) [ZNXNKG02LM](https://www.zigbee2mqtt.io/devices/ZNXNKG02LM.html)
      - Supports Zigbee2MQTT versions, including 2.0.0 and later updates. (It is expected to work on lower versions as well.)

    ## Prerequisites
      - Requires **Home Assistant Core `2025.4` or newer**. This minimum is
        enforced by the Blueprint metadata, so older Core versions cannot import it.
      - Home Assistant 2025.4 made variables accessible across nested and parallel action
        scopes. The Hold and rotation listeners rely on that shared run-scope behavior.
      - The knob only works when connected via `Zigbee2MQTT`.
      - The operation mode of the knob must be set to `event`. It is unknown whether it works in `command` mode.
      
      - The controlled lights can be connected through any platform. (Color temperature adjustment in Kelvin must be supported.)
      - The MQTT integration must be installed in Home Assistant.

      - The blueprint consumes each JSON event directly from the Zigbee2MQTT device topic.
        It does not depend on generated Home Assistant sensor entity IDs.
      - The global automation mode is `parallel`, so `start_rotating` can start its
        listener immediately even while a configured press action is still running.
        Only `single`, `double`, `hold`, `release`, and `start_rotating` create
        top-level runs. Intermediate rotation packets stay inside one gesture run.
      - Internal parallel blocks only keep a listener alive beside one sequential
        worker. Light service commands for a rotation gesture never run in multiple
        branches.
      - Rotation is processed as one gesture from `start_rotating` through
        `stop_rotating`. The listener keeps the newest cumulative
        `action_rotation_angle`, so intermediate rotation packets may be coalesced and
        no longer create separate top-level traces.
      - The final stop packet can supply the last cumulative angle. When an off light
        needs a restore-only startup command, only the first positive packet is
        consumed; any later coalesced movement is still applied.

    ## Breaking Change: Direct Per-Tick Controls
      - The legacy step-size multiplier behavior is deprecated. The existing input IDs are retained, but their values now have direct physical meanings.
      - One knob tick is `12 degrees`.
      - Brightness is now configured as `1-10 %/tick`; the default is exactly `4 %/tick`.
      - Pressed-rotation color temperature is now configured as `1-10000 K/tick`; the default is `60 K/tick`.
      - After re-importing this blueprint, open every automation created from it, review these two inputs, and save it again.
      - Existing brightness values above `10` are no longer valid and must be changed to a value from `1` through `10`.
      - To preserve the old default color-temperature response, change a saved value of `5` to `60 K/tick`.

    ## Customizing Options

      - It's a bit unfortunate to forgo the UI dropdown to support Jinja2 templates, but this allows setting `target_light` dynamically, such as using the state of an `input_select` or other flexible configurations.
        If you don't need a template, simply enter the `entity_id` of the light directly. (Example: light.my_bulb)

      - If Restore Brightness is disabled (default), turning the knob `right` to turn on the Target Light will start at the `minimum brightness` and increase based on the knob rotation.
      
      - If the Restore Brightness option is enabled, turning the knob `right` to turn on the Target Light while it is off will restore its previous brightness state (if supported by the light).

      - You can set the `transition time` for smooth brightness and color temperature adjustments. The default value is `0.4s`, as it matches the default transition time of my Hue bulbs.

      - You can adjust the amount of color temperature change per tick of the knob.
      
      - You can adjust the brightness percentage change per tick of the knob.
      
      - Added functionality to set the starting color temperature via the `Default Color Temp Setting` when adjusting the light's color temperature by pressing and turning the light (instead of using the color temperature mode). The default value is set to `4000k`

      - You can set the minimum and maximum color temperature values to limit the physically adjustable range. If you don’t want any restrictions, you can ignore this setting.

    ## User Manual
      1. If you haven’t changed the topic in Zigbee2MQTT, you don’t need to modify the base topic. Leave it as the `default` value

      2. Type in the `friendly name` of the knob exactly as it appears in the `Zigbee2MQTT Web UI`
         Ensure that uppercase letters, spaces, and underscores match the exact formatting used in Zigbee2MQTT.

      3. Ensure that all prerequisites are fully met before proceeding.

      4. Adjust the Knob Action Config settings according to your needs, following the options listed in Customizing Options.

    ## How It Works
    *Press Action*
      - `Single`, `Double`, `Hold`, and `Release` actions can all be customized in the press action section.
      - `Hold` can run once, repeat itself, or start one action and repeat a separate action until `Release`.

    *Knob Action*
      - Turning the knob right without pressing increases brightness (+), Turning the knob left without pressing decreases brightness (-).
      - Turning the knob right while pressing increases the color temperature (cooler), Turning the knob left while pressing decreases the color temperature (warmer).

  domain: automation
  homeassistant:
    min_version: 2025.4.0
  input:
    base_topic:
      name: Base Topic
      description: The base topic configured in Zigbee2MQTT.
        <br>If you haven't changed this, leave the default here `Zigbee2MQTT`
      default: zigbee2mqtt
    knob:
      name: Knob Name
      description: The `FRIENDLY NAME` of the Zigbee device you want to control.
        <br> (as set in `Zigbee2MQTT web UI`;).
      selector:
        text: {}

    translate_friendly_name:
      name: Translate Friendly Name (Deprecated)
      description:
        Deprecated compatibility input. It is no longer used because the blueprint reads
        the Zigbee2MQTT JSON event directly instead of generated sensor entities.
      default: ""

    target_light:
      name: Target Light
      description:
        Select the light entity to control brightness and color temperature.
        # <br>- When you set up to control more than one light, the `brightness` of the lights will not be synchronized.
        # <br>- If you want to control multiple lights or just the ones that are `ON`, you can set it up like this (NOT recommended due to popcorning)
        # <br>  `1. light.a, light.b`
        # <br>  `2. {{ expand('light.a','light.b') | selectattr('state', 'eq', 'on') | map(attribute='entity_id') | list }}`
        # <br> Color temperature control does not work with press rotation when setting up multiple lights
      selector:
        template: {}

    # Restore Brightness option
    restore_brightness:
      name: Restore Brightness
      description: When "`TRUE`";
        <br>If the Target light is `OFF` and you turn the knob to the right, it first restores the brightness level from before the light was turned off, and then adjusts the brightness.
        <br>When "`FALSE`";
        <br>If the Target light is `OFF` and you turn the knob to the right, the brightness is adjusted starting from 0%.
        <br>The default setting is "`FALSE`".
      default: false
      selector:
        boolean:

    color_temp_base:
      name: Default Color Temp setting
      description:
        If the `TARGET LIGHT` is operating in a mode other than Color Temp (e.g., RGB, HS, etc.),
        <br>this setting determines the starting color temperature (within 1000K - 10000K) when pressing and turning the knob.
        <br>The selected value must not be higher than the `TARGET LIGHT`'s `min_color_temp` or lower than `max_color_temp`
      default: 4000
      selector:
        number:
          min: 1000
          max: 10000
          unit_of_measurement: "K"

    ##### Press Action
    press_action:
      name: Press Action
      description: Set the action to be triggered when the knob is pressed.
      icon: mdi:gesture-tap-button
      collapsed: false
      input:
        action_single:
          name: Single Action
          description: Action to take when `tapped`
          default: []
          selector:
            action: {}
        action_double:
          name: Double Action
          description: Actions to take when `double-tapped`
          default: []
          selector:
            action: {}
        action_hold:
          name: Hold Action
          description: Action to run once when `hold` starts. Depending on Hold Repeat Mode, this action can also repeat. Keep repeating actions short so the next knob event can stop the loop promptly.
          default: []
          selector:
            action: {}

        hold_repeat_mode:
          name: Hold Repeat Mode
          description: Choose whether Hold Action runs once, repeats, or starts once before a separate action repeats.
          default: none
          selector:
            select:
              mode: dropdown
              options:
                - label: Do not repeat
                  value: none
                - label: Repeat Hold Action
                  value: repeat_hold
                - label: Hold Action once, then repeat Hold Repeat Action
                  value: separate_repeat

        action_hold_repeat:
          name: Hold Repeat Action
          description: Action repeated only when Hold Repeat Mode is set to use a separate repeat action. Use short, non-blocking service calls for prompt stopping.
          default: []
          selector:
            action: {}

        hold_repeat_interval:
          name: Hold Repeat Interval
          description: Delay between repeated Hold actions.
          default: 0.5
          selector:
            number:
              min: 0.1
              max: 10
              step: 0.1
              unit_of_measurement: s
              mode: box

        hold_repeat_max_duration:
          name: Hold Repeat Maximum Duration
          description: Safety limit for a repeating Hold if the Release message is lost. No new repetition starts after this duration; an action already running is allowed to finish.
          default: 60
          selector:
            number:
              min: 1
              max: 300
              step: 1
              unit_of_measurement: s
              mode: box

        action_release:
          name: Release Action
          description: Action to run once when the knob is released after a Hold.
          default: []
          selector:
            action: {}

    ##### Knob Action
    knob_action:
      name: Knob Action Config
      description: Adjust the settings required for knob operation.
      icon: mdi:knob
      collapsed: true
      input:
        transition_time:
          name: TRANSITION TIME
          description:
            Set the transition value for smooth brightness and color temperature adjustments.
            <br>The default value is `0.4`
          default: 0.4
          selector:
            number:
              min: 0.0
              max: 20.0
              step: 0.1
              unit_of_measurement: s
              mode: slider

        knob_control_min_brightness:
          name: Min Brightness Limit (%)
          description:
            Set the minimum brightness limit. 
            <br>The light will not dim below this value (%) when turning the knob.
            <br>If set to 0 (default), there is no limit and the light can be turned off.
          default: 0
          selector:
            number:
              min: 0
              max: 99
              step: 1
              unit_of_measurement: "%"
              mode: slider

        knob_control_max_brightness:
          name: Max Brightness Limit (%)
          description:
            Set the maximum brightness limit.
            <br>The light will not brighten above this value (%) when turning the knob.
            <br>If set to 100 (default), there is no limit.
          default: 100
          selector:
            number:
              min: 1
              max: 100
              step: 1
              unit_of_measurement: "%"
              mode: slider

        brightness_stepsize:
          name: Brightness per Tick
          description:
            Set the exact brightness percentage change for one 12-degree knob tick.
            <br>For example, `1` means `1%` per tick and a 60-degree packet changes brightness by `5%`.
            <br>The default value is `4%` per tick.
          default: 4
          selector:
            number:
              min: 1
              max: 10
              step: 1
              unit_of_measurement: "%/tick"
              mode: slider

        color_temp_stepsize:
          name: Color Temperature per Tick
          description:
            Set the exact Kelvin change for one 12-degree pressed-rotation tick.
            <br>For example, `60` means `60 K` per tick and a 60-degree packet changes color temperature by `300 K`.
            <br>The default value is `60 K` per tick.
          default: 60
          selector:
            number:
              min: 1
              max: 10000
              step: 1
              unit_of_measurement: "K/tick"
              mode: box

        color_temp_min:
          name: Min Color Temp Kelvin
          description:
            Set the minimum color temperature within the target light's operational range. (Use Kelvin values)
            <br>`NOTE!`
            <br> The color temperature will not go lower than the set value.
            <br> This value MUST BE LOWER than `Max Color Temp Kelvin`
          default: 1000
          selector:
            number:
              min: 1000
              max: 10000
              unit_of_measurement: "K"

        color_temp_max:
          name: Max Color Temp Kelvin
          description:
            Set the maximum color temperature within the target light's operational range. (Use Kelvin values)
            <br>`NOTE!`
            <br> The color temperature will not go higher than the set value.
            <br> This value MUST BE HIGHER than `Min Color Temp Kelvin`.
          default: 10000
          selector:
            number:
              min: 1000
              max: 10000
              unit_of_measurement: "K"

####################
mode: parallel
max: 1000
max_exceeded: warning
trace:
  stored_traces: 20
####################

trigger_variables:
  base_topic: !input base_topic
  knob: !input knob
trigger:
  - platform: mqtt
    topic: "{{ base_topic }}/{{ knob }}"
    payload: action
    value_template: >-
      {{ 'action' if value_json.action | default('') in
        ['single', 'double', 'hold', 'release', 'start_rotating']
        else 'ignore' }}

action:
  - variables:
      ACTION: "{{ trigger.payload_json.action | default('') }}"
      TARGET_LIGHT: !input target_light
      KNOB_MIN_BRIGHT_PCT: !input knob_control_min_brightness
      KNOB_MAX_BRIGHT_PCT: !input knob_control_max_brightness
      BRIGHTNESS_STEP_PCT: !input brightness_stepsize
      COLOR_TEMP_STEP_K: !input color_temp_stepsize
      RESTORE_BRIGHTNESS: !input restore_brightness
      TEMP_BASE: !input color_temp_base
      TEMP_MIN: !input color_temp_min
      TEMP_MAX: !input color_temp_max
      TRANSITION_TIME: !input transition_time
      HOLD_REPEAT_MODE: !input hold_repeat_mode
      HOLD_REPEAT_INTERVAL: !input hold_repeat_interval
      HOLD_REPEAT_MAX_DURATION: !input hold_repeat_max_duration
      HOLD_DEADLINE: >-
        {{ as_timestamp(now()) +
          (HOLD_REPEAT_MAX_DURATION | float(60)) }}
      HOLD_STOPPED: false
      ROTATION_LATEST_ACTION: "{{ trigger.payload_json.action | default('') }}"
      ROTATION_LATEST_ANGLE: >-
        {{ trigger.payload_json.action_rotation_angle | float(0) }}
      ROTATION_LATEST_BUTTON_STATE: >-
        {{ trigger.payload_json.action_rotation_button_state |
          default('', true) }}
      ROTATION_LISTENER_DONE: false
      ROTATION_PACKET_ANGLE: null
      ROTATION_PACKET_BUTTON_STATE: null
      ROTATION_STARTUP_ANGLE: >-
        {{ ROTATION_LATEST_ANGLE | float(0)
          if ROTATION_LATEST_ANGLE | float(0) > 0 else none }}
      ROTATION_STARTUP_BUTTON_STATE: >-
        {{ ROTATION_LATEST_BUTTON_STATE
          if ROTATION_STARTUP_ANGLE is not none else none }}
      ROTATION_APPLIED_ANGLE: null
      ROTATION_APPLIED_BUTTON_STATE: null
      ROTATION_ANGLE_OFFSET: 0
      ROTATION_OFF_STARTUP_PENDING: >-
        {{ states(TARGET_LIGHT) == 'off' }}

  - variables:
      ROTATION_BASE_BRIGHTNESS_PCT: >-
        {{ (state_attr(TARGET_LIGHT, 'brightness') |
          float(0) / 255 * 100) | round(0) }}
      ROTATION_LIGHT_TEMP_MIN: >-
        {{ state_attr(TARGET_LIGHT, 'min_color_temp_kelvin') |
          int(TEMP_MIN | int) }}
      ROTATION_LIGHT_TEMP_MAX: >-
        {{ state_attr(TARGET_LIGHT, 'max_color_temp_kelvin') |
          int(TEMP_MAX | int) }}

  - variables:
      ROTATION_COLOR_TEMP_MIN: >-
        {{ max(TEMP_MIN | int, ROTATION_LIGHT_TEMP_MIN | int) }}
      ROTATION_COLOR_TEMP_MAX: >-
        {{ min(TEMP_MAX | int, ROTATION_LIGHT_TEMP_MAX | int) }}

  - variables:
      ROTATION_BASE_COLOR_TEMP_K: >-
        {% set gesture_start_temp =
          state_attr(TARGET_LIGHT, 'color_temp_kelvin') %}
        {% if gesture_start_temp is not none %}
          {{ gesture_start_temp | int }}
        {% else %}
          {{ min(ROTATION_COLOR_TEMP_MAX | int,
            max(ROTATION_COLOR_TEMP_MIN | int, TEMP_BASE | int)) }}
        {% endif %}

  - variables:
      ROTATION_LAST_BRIGHTNESS_TARGET: >-
        {{ ROTATION_BASE_BRIGHTNESS_PCT | round(0) }}
      ROTATION_LAST_COLOR_TEMP_TARGET: >-
        {{ ROTATION_BASE_COLOR_TEMP_K | int }}

  - choose:
      - conditions: "{{ ACTION == 'single' }}"
        sequence: !input action_single

      - conditions: "{{ ACTION == 'double' }}"
        sequence: !input action_double

      - conditions: "{{ ACTION == 'release' }}"
        sequence: !input action_release

      - conditions: "{{ ACTION == 'hold' }}"
        sequence:
          - if:
              - condition: template
                value_template: "{{ HOLD_REPEAT_MODE == 'none' }}"
            then:
              - choose:
                  - conditions: "{{ true }}"
                    sequence: !input action_hold
            else:
              - parallel:
                  - alias: Hold stop listener
                    sequence:
                      - wait_for_trigger:
                          - platform: mqtt
                            topic: "{{ base_topic }}/{{ knob }}"
                            payload: action
                            value_template: >-
                              {{ 'action' if value_json.action | default('') else 'ignore' }}
                        timeout:
                          seconds: >-
                            {{ max(0,
                              (HOLD_DEADLINE | float(0)) -
                              as_timestamp(now())) }}
                        continue_on_timeout: true

                      - variables:
                          HOLD_STOPPED: true

                  - alias: Hold repeat worker
                    sequence:
                      - delay:
                          milliseconds: 1

                      - choose:
                          - conditions: "{{ true }}"
                            sequence: !input action_hold

                      - repeat:
                          while:
                            - condition: template
                              value_template: >-
                                {{ not HOLD_STOPPED and
                                  as_timestamp(now()) <
                                    (HOLD_DEADLINE | float(0)) }}
                          sequence:
                            - variables:
                                HOLD_WORKER_REMAINING: >-
                                  {{ max(0,
                                    (HOLD_DEADLINE | float(0)) -
                                    as_timestamp(now())) }}

                            - delay:
                                seconds: >-
                                  {{ min(HOLD_REPEAT_INTERVAL | float(0.5),
                                    HOLD_WORKER_REMAINING | float(0)) }}

                            - if:
                                - condition: template
                                  value_template: >-
                                    {{ not HOLD_STOPPED and
                                      as_timestamp(now()) <
                                        (HOLD_DEADLINE | float(0)) }}
                              then:
                                - choose:
                                    - conditions: "{{ HOLD_REPEAT_MODE == 'repeat_hold' }}"
                                      sequence: !input action_hold
                                    - conditions: "{{ HOLD_REPEAT_MODE == 'separate_repeat' }}"
                                      sequence: !input action_hold_repeat

      - conditions: "{{ ACTION == 'start_rotating' }}"
        sequence:
          - parallel:
              - alias: Rotation gesture listener
                sequence:
                  - repeat:
                      sequence:
                        - wait_for_trigger:
                            - platform: mqtt
                              topic: "{{ base_topic }}/{{ knob }}"
                              payload: action
                              value_template: >-
                                {{ 'action' if value_json.action | default('') else 'ignore' }}
                          timeout:
                            seconds: 2
                          continue_on_timeout: true

                        - if:
                            - condition: template
                              value_template: "{{ wait.completed }}"
                          then:
                            - variables:
                                ROTATION_LATEST_ACTION: >-
                                  {{ wait.trigger.payload_json.action |
                                    default('') }}
                                ROTATION_PACKET_ANGLE: >-
                                  {% if wait.trigger.payload_json.action_rotation_angle is defined %}
                                    {{ wait.trigger.payload_json.action_rotation_angle | float(0) }}
                                  {% else %}
                                    {{ ROTATION_LATEST_ANGLE }}
                                  {% endif %}
                                ROTATION_PACKET_BUTTON_STATE: >-
                                  {% if wait.trigger.payload_json.action_rotation_button_state is defined %}
                                    {{ wait.trigger.payload_json.action_rotation_button_state |
                                      default('', true) }}
                                  {% else %}
                                    {{ ROTATION_LATEST_BUTTON_STATE }}
                                  {% endif %}

                            - if:
                                - condition: template
                                  value_template: >-
                                    {{ ROTATION_LATEST_ACTION in ['rotation', 'stop_rotating'] }}
                              then:
                                - variables:
                                    ROTATION_LATEST_ANGLE: >-
                                      {{ ROTATION_PACKET_ANGLE | float(0) }}
                                    ROTATION_LATEST_BUTTON_STATE: >-
                                      {{ ROTATION_PACKET_BUTTON_STATE }}

                                - if:
                                    - condition: template
                                      value_template: >-
                                        {{ ROTATION_STARTUP_ANGLE is none and
                                          ROTATION_PACKET_ANGLE | float(0) > 0 }}
                                  then:
                                    - variables:
                                        ROTATION_STARTUP_ANGLE: >-
                                          {{ ROTATION_PACKET_ANGLE | float(0) }}
                                        ROTATION_STARTUP_BUTTON_STATE: >-
                                          {{ ROTATION_PACKET_BUTTON_STATE }}

                                - if:
                                    - condition: template
                                      value_template: >-
                                        {{ ROTATION_LATEST_ACTION ==
                                          'stop_rotating' }}
                                  then:
                                    - variables:
                                        ROTATION_LISTENER_DONE: true
                              else:
                                - variables:
                                    ROTATION_LISTENER_DONE: true
                          else:
                            - variables:
                                ROTATION_LISTENER_DONE: true
                      until:
                        - condition: template
                          value_template: "{{ ROTATION_LISTENER_DONE }}"

              - alias: Sequential light command worker
                sequence:
                  - delay:
                      milliseconds: 1

                  - repeat:
                      sequence:
                        - if:
                            - condition: template
                              value_template: >-
                                {{ ROTATION_APPLIED_ANGLE is none or
                                  ROTATION_APPLIED_ANGLE | float(0) !=
                                    ROTATION_LATEST_ANGLE | float(0) or
                                  ROTATION_APPLIED_BUTTON_STATE !=
                                    ROTATION_LATEST_BUTTON_STATE }}
                          then:
                            - variables:
                                ROTATION_PROCESS_STARTUP: >-
                                  {{ ROTATION_OFF_STARTUP_PENDING and
                                    ROTATION_STARTUP_ANGLE is not none and
                                    (ROTATION_STARTUP_BUTTON_STATE == 'pressed' or
                                      RESTORE_BRIGHTNESS) and
                                    (ROTATION_APPLIED_ANGLE is none or
                                      ROTATION_APPLIED_ANGLE | float(0) !=
                                        ROTATION_STARTUP_ANGLE | float(0) or
                                      ROTATION_APPLIED_BUTTON_STATE !=
                                        ROTATION_STARTUP_BUTTON_STATE) }}

                            - variables:
                                ROTATION_WORK_ANGLE: >-
                                  {{ ROTATION_STARTUP_ANGLE | float(0)
                                    if ROTATION_PROCESS_STARTUP else
                                    ROTATION_LATEST_ANGLE | float(0) }}
                                ROTATION_WORK_BUTTON_STATE: >-
                                  {{ ROTATION_STARTUP_BUTTON_STATE
                                    if ROTATION_PROCESS_STARTUP else
                                    ROTATION_LATEST_BUTTON_STATE }}

                            - variables:
                                ROTATION_TICKS: >-
                                  {{ ((ROTATION_WORK_ANGLE | float(0)) -
                                    (ROTATION_ANGLE_OFFSET | float(0))) / 12 }}

                            - choose:
                                - conditions: >-
                                    {{ ROTATION_WORK_BUTTON_STATE ==
                                      'released' }}
                                  sequence:
                                    - variables:
                                        BRIGHTNESS_TARGET_PCT: >-
                                          {{ min(KNOB_MAX_BRIGHT_PCT | int,
                                            max(KNOB_MIN_BRIGHT_PCT | int,
                                              ROTATION_BASE_BRIGHTNESS_PCT | float(0) +
                                              ROTATION_TICKS | float(0) *
                                              BRIGHTNESS_STEP_PCT | float(0))) }}

                                    - if:
                                        - condition: template
                                          value_template: >-
                                            {{ ROTATION_OFF_STARTUP_PENDING and
                                              RESTORE_BRIGHTNESS and
                                              ROTATION_TICKS | float(0) > 0 }}
                                      then:
                                        - action: light.turn_on
                                          target:
                                            entity_id: "{{ TARGET_LIGHT }}"
                                          data:
                                            transition: "{{ TRANSITION_TIME }}"

                                        - alias: Wait for restored brightness state
                                          wait_template: >-
                                            {{ is_state(TARGET_LIGHT, 'on') and
                                              state_attr(TARGET_LIGHT, 'brightness')
                                                is number }}
                                          timeout:
                                            seconds: 2
                                          continue_on_timeout: true

                                        - alias: Refresh restored brightness base
                                          variables:
                                            ROTATION_BASE_BRIGHTNESS_PCT: >-
                                              {% set restored_brightness =
                                                state_attr(TARGET_LIGHT, 'brightness') %}
                                              {% if restored_brightness is number %}
                                                {{ (restored_brightness | float(0) /
                                                  255 * 100) | round(0) }}
                                              {% else %}
                                                {{ ROTATION_BASE_BRIGHTNESS_PCT |
                                                  round(0) }}
                                              {% endif %}

                                        - variables:
                                            ROTATION_LAST_BRIGHTNESS_TARGET: >-
                                              {{ ROTATION_BASE_BRIGHTNESS_PCT |
                                                round(0) }}

                                        - variables:
                                            ROTATION_ANGLE_OFFSET: >-
                                              {{ ROTATION_WORK_ANGLE | float(0) }}
                                            ROTATION_OFF_STARTUP_PENDING: false
                                      else:
                                        - if:
                                            - condition: template
                                              value_template: >-
                                                {{ BRIGHTNESS_TARGET_PCT |
                                                  round(0) !=
                                                  ROTATION_LAST_BRIGHTNESS_TARGET |
                                                  round(0) }}
                                          then:
                                            - action: light.turn_on
                                              target:
                                                entity_id: "{{ TARGET_LIGHT }}"
                                              data:
                                                transition: "{{ TRANSITION_TIME }}"
                                                brightness_pct: >-
                                                  {{ BRIGHTNESS_TARGET_PCT |
                                                    round(0) }}

                                            - variables:
                                                ROTATION_LAST_BRIGHTNESS_TARGET: >-
                                                  {{ BRIGHTNESS_TARGET_PCT |
                                                    round(0) }}
                                                ROTATION_OFF_STARTUP_PENDING: false

                                - conditions: >-
                                    {{ ROTATION_WORK_BUTTON_STATE ==
                                      'pressed' }}
                                  sequence:
                                    - variables:
                                        COLOR_TEMP_TARGET_K: >-
                                          {{ min(ROTATION_COLOR_TEMP_MAX | int,
                                            max(ROTATION_COLOR_TEMP_MIN | int,
                                              ROTATION_BASE_COLOR_TEMP_K | int +
                                              ROTATION_TICKS | float(0) *
                                              COLOR_TEMP_STEP_K | float(0))) }}

                                    - if:
                                        - condition: template
                                          value_template: >-
                                            {{ ROTATION_OFF_STARTUP_PENDING and
                                              ROTATION_TICKS | float(0) > 0 }}
                                      then:
                                        - action: light.turn_on
                                          target:
                                            entity_id: "{{ TARGET_LIGHT }}"
                                          data:
                                            transition: "{{ TRANSITION_TIME }}"

                                        - alias: Wait for restored color temperature state
                                          wait_template: >-
                                            {{ is_state(TARGET_LIGHT, 'on') and
                                              state_attr(TARGET_LIGHT, 'brightness')
                                                is number }}
                                          timeout:
                                            seconds: 2
                                          continue_on_timeout: true

                                        - alias: Refresh restored color temperature base
                                          variables:
                                            ROTATION_BASE_COLOR_TEMP_K: >-
                                              {% set restored_temp =
                                                state_attr(TARGET_LIGHT, 'color_temp_kelvin') %}
                                              {% if restored_temp is number %}
                                                {{ min(ROTATION_COLOR_TEMP_MAX | int,
                                                  max(ROTATION_COLOR_TEMP_MIN | int,
                                                    restored_temp | int)) }}
                                              {% else %}
                                                {{ ROTATION_BASE_COLOR_TEMP_K | int }}
                                              {% endif %}

                                        - variables:
                                            ROTATION_LAST_COLOR_TEMP_TARGET: >-
                                              {{ ROTATION_BASE_COLOR_TEMP_K | int }}

                                        - variables:
                                            ROTATION_ANGLE_OFFSET: >-
                                              {{ ROTATION_WORK_ANGLE | float(0) }}
                                            ROTATION_OFF_STARTUP_PENDING: false
                                      else:
                                        - if:
                                            - condition: template
                                              value_template: >-
                                                {{ COLOR_TEMP_TARGET_K | int !=
                                                  ROTATION_LAST_COLOR_TEMP_TARGET |
                                                  int }}
                                          then:
                                            - action: light.turn_on
                                              target:
                                                entity_id: "{{ TARGET_LIGHT }}"
                                              data:
                                                transition: "{{ TRANSITION_TIME }}"
                                                color_temp_kelvin: >-
                                                  {{ COLOR_TEMP_TARGET_K | int }}

                                            - variables:
                                                ROTATION_LAST_COLOR_TEMP_TARGET: >-
                                                  {{ COLOR_TEMP_TARGET_K | int }}
                                                ROTATION_OFF_STARTUP_PENDING: false

                            - variables:
                                ROTATION_APPLIED_ANGLE: >-
                                  {{ ROTATION_WORK_ANGLE | float(0) }}
                                ROTATION_APPLIED_BUTTON_STATE: >-
                                  {{ ROTATION_WORK_BUTTON_STATE }}
                          else:
                            - delay:
                                milliseconds: 25
                      until:
                        - condition: template
                          value_template: >-
                            {{ ROTATION_LISTENER_DONE and
                              ROTATION_APPLIED_ANGLE is not none and
                              ROTATION_APPLIED_ANGLE | float(0) ==
                                ROTATION_LATEST_ANGLE | float(0) and
                              ROTATION_APPLIED_BUTTON_STATE ==
                                ROTATION_LATEST_BUTTON_STATE }}
