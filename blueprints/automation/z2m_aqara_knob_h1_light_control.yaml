blueprint:
  name: Aqara Rotary Knob H1 – Adjustable Brightness & Color Temperature (Z2M)
  description: |-
    ## Supporting
      - Aqara Rotary Knob H1 (wireless) [ZNXNKG02LM](https://www.zigbee2mqtt.io/devices/ZNXNKG02LM.html)
      - Supports Zigbee2MQTT versions, including 2.0.0 and later updates. (It is expected to work on lower versions as well.)

    ## Prerequisites
      - Requires at least **Home Assistant Core `2024.08`** version.
      - The knob only works when connected via `Zigbee2MQTT`.
      - The operation mode of the knob must be set to `event`. It is unknown whether it works in `command` mode.
      
      - The controlled lights can be connected through any platform. (Color temperature adjustment in Kelvin must be supported.)
      - The MQTT integration must be installed in Home Assistant.

      - The blueprint consumes each JSON event directly from the Zigbee2MQTT device topic.
        It does not depend on generated Home Assistant sensor entity IDs.
      - MQTT events are queued and processed in arrival order. Rotation uses the
        `action_rotation_angle_speed` increment contained in that same JSON message.

    ## Customizing Options

      - It's a bit unfortunate to forgo the UI dropdown to support Jinja2 templates, but this allows setting `target_light` dynamically, such as using the state of an `input_select` or other flexible configurations.
        If you don't need a template, simply enter the `entity_id` of the light directly. (Example: light.my_bulb)

      - If Restore Brightness is disabled (default), turning the knob `right` to turn on the Target Light will start at the `minimum brightness` and increase based on the knob rotation.
      
      - If the Restore Brightness option is enabled, turning the knob `right` to turn on the Target Light while it is off will restore its previous brightness state (if supported by the light).

      - You can set the `transition time` for smooth brightness and color temperature adjustments. The default value is `0.4s`, as it matches the default transition time of my Hue bulbs.

      - You can adjust the amount of color temperature change per tick of the knob.
      
      - You can adjust the brightness percentage change per tick of the knob.
      
      - Added functionality to set the starting color temperature via the `Default Color Temp Setting` when adjusting the light's color temperature by pressing and turning the light (instead of using the color temperature mode). The default value is set to `4000k`

      - You can set the minimum and maximum color temperature values to limit the physically adjustable range. If you don’t want any restrictions, you can ignore this setting.

    ## User Manual
      1. If you haven’t changed the topic in Zigbee2MQTT, you don’t need to modify the base topic. Leave it as the `default` value

      2. Type in the `friendly name` of the knob exactly as it appears in the `Zigbee2MQTT Web UI`
         Ensure that uppercase letters, spaces, and underscores match the exact formatting used in Zigbee2MQTT.

      3. Ensure that all prerequisites are fully met before proceeding.

      4. Adjust the Knob Action Config settings according to your needs, following the options listed in Customizing Options.

    ## How It Works
    *Press Action*
      - `Single`, `Double`, `Hold`, and `Release` actions can all be customized in the press action section.
      - `Hold` can run once, repeat itself, or start one action and repeat a separate action until `Release`.

    *Knob Action*
      - Turning the knob right without pressing increases brightness (+), Turning the knob left without pressing decreases brightness (-).
      - Turning the knob right while pressing increases the color temperature (cooler), Turning the knob left while pressing decreases the color temperature (warmer).

  domain: automation
  input:
    base_topic:
      name: Base Topic
      description: The base topic configured in Zigbee2MQTT.
        <br>If you haven't changed this, leave the default here `Zigbee2MQTT`
      default: zigbee2mqtt
    knob:
      name: Knob Name
      description: The `FRIENDLY NAME` of the Zigbee device you want to control.
        <br> (as set in `Zigbee2MQTT web UI`;).
      selector:
        text: {}

    translate_friendly_name:
      name: Translate Friendly Name (Deprecated)
      description:
        Deprecated compatibility input. It is no longer used because the blueprint reads
        the Zigbee2MQTT JSON event directly instead of generated sensor entities.
      default: ""

    target_light:
      name: Target Light
      description:
        Select the light entity to control brightness and color temperature.
        # <br>- When you set up to control more than one light, the `brightness` of the lights will not be synchronized.
        # <br>- If you want to control multiple lights or just the ones that are `ON`, you can set it up like this (NOT recommended due to popcorning)
        # <br>  `1. light.a, light.b`
        # <br>  `2. {{ expand('light.a','light.b') | selectattr('state', 'eq', 'on') | map(attribute='entity_id') | list }}`
        # <br> Color temperature control does not work with press rotation when setting up multiple lights
      selector:
        template: {}

    # Restore Brightness option
    restore_brightness:
      name: Restore Brightness
      description: When "`TRUE`";
        <br>If the Target light is `OFF` and you turn the knob to the right, it first restores the brightness level from before the light was turned off, and then adjusts the brightness.
        <br>When "`FALSE`";
        <br>If the Target light is `OFF` and you turn the knob to the right, the brightness is adjusted starting from 0%.
        <br>The default setting is "`FALSE`".
      default: false
      selector:
        boolean:

    color_temp_base:
      name: Default Color Temp setting
      description:
        If the `TARGET LIGHT` is operating in a mode other than Color Temp (e.g., RGB, HS, etc.),
        <br>this setting determines the starting color temperature (within 1000K - 10000K) when pressing and turning the knob.
        <br>The selected value must not be higher than the `TARGET LIGHT`'s `min_color_temp` or lower than `max_color_temp`
      default: 4000
      selector:
        number:
          min: 1000
          max: 10000
          unit_of_measurement: "K"

    ##### Press Action
    press_action:
      name: Press Action
      description: Set the action to be triggered when the knob is pressed.
      icon: mdi:gesture-tap-button
      collapsed: false
      input:
        action_single:
          name: Single Action
          description: Action to take when `tapped`
          default: []
          selector:
            action: {}
        action_double:
          name: Double Action
          description: Actions to take when `double-tapped`
          default: []
          selector:
            action: {}
        action_hold:
          name: Hold Action
          description: Action to run once when `hold` starts. Depending on Hold Repeat Mode, this action can also repeat. Keep repeating actions short so the next knob event can stop the loop promptly.
          default: []
          selector:
            action: {}

        hold_repeat_mode:
          name: Hold Repeat Mode
          description: Choose whether Hold Action runs once, repeats, or starts once before a separate action repeats.
          default: none
          selector:
            select:
              mode: dropdown
              options:
                - label: Do not repeat
                  value: none
                - label: Repeat Hold Action
                  value: repeat_hold
                - label: Hold Action once, then repeat Hold Repeat Action
                  value: separate_repeat

        action_hold_repeat:
          name: Hold Repeat Action
          description: Action repeated only when Hold Repeat Mode is set to use a separate repeat action. Use short, non-blocking service calls for prompt stopping.
          default: []
          selector:
            action: {}

        hold_repeat_interval:
          name: Hold Repeat Interval
          description: Delay between repeated Hold actions.
          default: 0.5
          selector:
            number:
              min: 0.1
              max: 10
              step: 0.1
              unit_of_measurement: s
              mode: box

        hold_repeat_max_duration:
          name: Hold Repeat Maximum Duration
          description: Safety limit for a repeating Hold if the Release message is lost. No new repetition starts after this duration; an action already running is allowed to finish.
          default: 60
          selector:
            number:
              min: 1
              max: 300
              step: 1
              unit_of_measurement: s
              mode: box

        action_release:
          name: Release Action
          description: Action to run once when the knob is released after a Hold.
          default: []
          selector:
            action: {}

    ##### Knob Action
    knob_action:
      name: Knob Action Config
      description: Adjust the settings required for knob operation.
      icon: mdi:knob
      collapsed: true
      input:
        transition_time:
          name: TRANSITION TIME
          description:
            Set the transition value for smooth brightness and color temperature adjustments.
            <br>The default value is `0.4`
          default: 0.4
          selector:
            number:
              min: 0.0
              max: 20.0
              step: 0.1
              unit_of_measurement: s
              mode: slider

        knob_control_min_brightness:
          name: Min Brightness Limit (%)
          description:
            Set the minimum brightness limit. 
            <br>The light will not dim below this value (%) when turning the knob.
            <br>If set to 0 (default), there is no limit and the light can be turned off.
          default: 0
          selector:
            number:
              min: 0
              max: 99
              step: 1
              unit_of_measurement: "%"
              mode: slider

        knob_control_max_brightness:
          name: Max Brightness Limit (%)
          description:
            Set the maximum brightness limit.
            <br>The light will not brighten above this value (%) when turning the knob.
            <br>If set to 100 (default), there is no limit.
          default: 100
          selector:
            number:
              min: 1
              max: 100
              step: 1
              unit_of_measurement: "%"
              mode: slider

        brightness_stepsize:
          name: Brightness Stepsize
          description:
            Set the step size for brightness adjustment when moving the knob by one tick.
            <br>If set to the default value of `4`, each tick adjusts the brightness by approximately `2%`.
            <br>Adjust as needed after testing.
            <br>If you want to increase brightness by approximately `1%` per tick, set the value to `+2`.
            <br>The default value is `4`
          default: 4
          selector:
            number:
              min: 1
              max: 100
              step: 1
              unit_of_measurement: /2 = %
              mode: slider

        color_temp_stepsize:
          name: Color Temp Stepsize
          description:
            Set the step size for adjusting the color temperature when turning the knob while pressing it.
            <br>The default value is `5.0`.
          default: 5.0
          selector:
            number:
              min: 1
              max: 20
              step: 0.1
              unit_of_measurement: num
              mode: slider

        color_temp_min:
          name: Min Color Temp Kelvin
          description:
            Set the minimum color temperature within the target light's operational range. (Use Kelvin values)
            <br>`NOTE!`
            <br> The color temperature will not go lower than the set value.
            <br> This value MUST BE LOWER than `Max Color Temp Kelvin`
          default: 1000
          selector:
            number:
              min: 1000
              max: 10000
              unit_of_measurement: "K"

        color_temp_max:
          name: Max Color Temp Kelvin
          description:
            Set the maximum color temperature within the target light's operational range. (Use Kelvin values)
            <br>`NOTE!`
            <br> The color temperature will not go higher than the set value.
            <br> This value MUST BE HIGHER than `Min Color Temp Kelvin`.
          default: 10000
          selector:
            number:
              min: 1000
              max: 10000
              unit_of_measurement: "K"

####################
mode: queued
max: 1000
max_exceeded: warning
trace:
  stored_traces: 20
####################

trigger_variables:
  base_topic: !input base_topic
  knob: !input knob
trigger:
  - platform: mqtt
    topic: "{{ base_topic }}/{{ knob }}"
    payload: action
    value_template: >-
      {{ 'action' if value_json.action | default('') else 'ignore' }}

action:
  - variables:
      ACTION: "{{ trigger.payload_json.action | default('') }}"
      ROTATION_DELTA: "{{ trigger.payload_json.action_rotation_angle_speed | float(0) }}"
      BUTTON_STATE: "{{ trigger.payload_json.action_rotation_button_state | default('', true) }}"
      TARGET_LIGHT: !input target_light
      KNOB_MIN_BRIGHT_PCT: !input knob_control_min_brightness
      KNOB_MAX_BRIGHT_PCT: !input knob_control_max_brightness
      BRIGHTNESS_STEPSIZE: !input brightness_stepsize
      TEMP_STEPSIZE: !input color_temp_stepsize
      RESTORE_BRIGHTNESS: !input restore_brightness
      TEMP_BASE: !input color_temp_base
      TEMP_MIN: !input color_temp_min
      TEMP_MAX: !input color_temp_max
      TRANSITION_TIME: !input transition_time
      HOLD_REPEAT_MODE: !input hold_repeat_mode
      HOLD_REPEAT_INTERVAL: !input hold_repeat_interval
      HOLD_REPEAT_MAX_DURATION: !input hold_repeat_max_duration

  - choose:
      - conditions: "{{ ACTION == 'single' }}"
        sequence: !input action_single

      - conditions: "{{ ACTION == 'double' }}"
        sequence: !input action_double

      - conditions: "{{ ACTION == 'release' }}"
        sequence: !input action_release

      - conditions: "{{ ACTION == 'hold' }}"
        sequence:
          - variables:
              HOLD_DEADLINE: >-
                {{ as_timestamp(now()) +
                  (HOLD_REPEAT_MAX_DURATION | float(60)) }}
              HOLD_STOPPED: false

          - choose:
              - conditions: "{{ true }}"
                sequence: !input action_hold

          - if:
              - condition: template
                value_template: "{{ HOLD_REPEAT_MODE != 'none' }}"
            then:
              - repeat:
                  while:
                    - condition: template
                      value_template: >-
                        {{ not HOLD_STOPPED and
                          as_timestamp(now()) < (HOLD_DEADLINE | float(0)) }}
                  sequence:
                    - variables:
                        HOLD_REMAINING: >-
                          {{ max(0,
                            (HOLD_DEADLINE | float(0)) -
                            as_timestamp(now())) }}

                    - wait_for_trigger:
                        - platform: mqtt
                          topic: "{{ base_topic }}/{{ knob }}"
                          payload: action
                          value_template: >-
                            {{ 'action' if value_json.action | default('') else 'ignore' }}
                      timeout:
                        seconds: >-
                          {{ min(HOLD_REPEAT_INTERVAL | float(0.5),
                            HOLD_REMAINING | float(0)) }}
                      continue_on_timeout: true

                    - if:
                        - condition: template
                          value_template: "{{ wait.completed }}"
                      then:
                        - variables:
                            HOLD_STOPPED: true
                      else:
                        - if:
                            - condition: template
                              value_template: >-
                                {{ as_timestamp(now()) <
                                  (HOLD_DEADLINE | float(0)) }}
                          then:
                            - choose:
                                - conditions: "{{ HOLD_REPEAT_MODE == 'repeat_hold' }}"
                                  sequence: !input action_hold
                                - conditions: "{{ HOLD_REPEAT_MODE == 'separate_repeat' }}"
                                  sequence: !input action_hold_repeat

      - conditions: >-
          {{ ACTION in ['start_rotating', 'rotation'] and
            ROTATION_DELTA | float(0) != 0 }}
        sequence:
          - variables:
              BRIGHTNESS_DELTA: >-
                {{ (((ROTATION_DELTA | float(0) / 3.6 / 3) *
                  BRIGHTNESS_STEPSIZE * 2.54) | round(0)) }}
              COLOR_TEMP_DELTA_K: >-
                {{ ROTATION_DELTA | float(0) * TEMP_STEPSIZE }}

          - choose:
              - conditions: "{{ BUTTON_STATE == 'released' }}"
                sequence:
                  - if:
                      - condition: template
                        value_template: >-
                          {{ states(TARGET_LIGHT) == 'off' and
                            RESTORE_BRIGHTNESS and BRIGHTNESS_DELTA > 0 }}
                    then:
                      - action: light.turn_on
                        target:
                          entity_id: "{{ TARGET_LIGHT }}"
                        data:
                          transition: "{{ TRANSITION_TIME }}"
                    else:
                      - variables:
                          CURRENT_PCT: >-
                            {{ (state_attr(TARGET_LIGHT, 'brightness') |
                              float(0) / 255 * 100) | round(0) }}
                          STEP_PCT: >-
                            {{ (BRIGHTNESS_DELTA | float(0) /
                              255 * 100) | round(1) }}
                          PROPOSED_PCT: >-
                            {{ (CURRENT_PCT | float(0) +
                              STEP_PCT | float(0)) | round(0) }}
                          CLAMPED_PCT: >-
                            {{ min(KNOB_MAX_BRIGHT_PCT | int,
                              max(KNOB_MIN_BRIGHT_PCT | int,
                                PROPOSED_PCT | int)) }}

                      - if:
                          - condition: template
                            value_template: >-
                              {{ CLAMPED_PCT | int !=
                                CURRENT_PCT | int }}
                        then:
                          - action: light.turn_on
                            target:
                              entity_id: "{{ TARGET_LIGHT }}"
                            data:
                              transition: "{{ TRANSITION_TIME }}"
                              brightness_pct: "{{ CLAMPED_PCT }}"

              - conditions: "{{ BUTTON_STATE == 'pressed' }}"
                sequence:
                  - if:
                      - condition: template
                        value_template: >-
                          {{ states(TARGET_LIGHT) == 'off' and
                            COLOR_TEMP_DELTA_K > 0 }}
                    then:
                      - action: light.turn_on
                        target:
                          entity_id: "{{ TARGET_LIGHT }}"
                        data:
                          transition: "{{ TRANSITION_TIME }}"
                    else:
                      - variables:
                          LIGHT_TEMP_MIN: >-
                            {{ state_attr(TARGET_LIGHT,
                              'min_color_temp_kelvin') |
                              int(TEMP_MIN | int) }}
                          LIGHT_TEMP_MAX: >-
                            {{ state_attr(TARGET_LIGHT,
                              'max_color_temp_kelvin') |
                              int(TEMP_MAX | int) }}
                          COLOR_TEMP_MIN: >-
                            {{ max(TEMP_MIN | int,
                              LIGHT_TEMP_MIN | int) }}
                          COLOR_TEMP_MAX: >-
                            {{ min(TEMP_MAX | int,
                              LIGHT_TEMP_MAX | int) }}
                          SAFE_TEMP_BASE: >-
                            {{ min(COLOR_TEMP_MAX,
                              max(COLOR_TEMP_MIN, TEMP_BASE | int)) }}
                          CURRENT_TEMP: >-
                            {% if state_attr(TARGET_LIGHT, 'color_temp_kelvin') is not none %}
                              {{ state_attr(TARGET_LIGHT, 'color_temp_kelvin') | int }}
                            {% else %}
                              {{ SAFE_TEMP_BASE }}
                            {% endif %}

                      - action: light.turn_on
                        target:
                          entity_id: "{{ TARGET_LIGHT }}"
                        data:
                          transition: "{{ TRANSITION_TIME }}"
                          color_temp_kelvin: >-
                            {{ min(COLOR_TEMP_MAX,
                              max(COLOR_TEMP_MIN,
                                CURRENT_TEMP | int +
                                COLOR_TEMP_DELTA_K | float(0))) }}
